<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Treinos — Jennifer Cilani</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --surface3: #2e2e2e;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ece4;
  --text2: #9a9690;
  --text3: #5c5a56;
  --accent: #c8a96e;
  --accent2: #e8c98a;
  --accent-dim: rgba(200,169,110,0.12);
  --accent-dim2: rgba(200,169,110,0.22);
  --success: #6dab7a;
  --success-dim: rgba(109,171,122,0.12);
  --warn: #d4956a;
  --warn-dim: rgba(212,149,106,0.12);
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 2rem;
}

/* HEADER */
.app-header {
  padding: 3rem 1.25rem 1.5rem;
  position: relative;
  overflow: hidden;
}
.app-header::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(200,169,110,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.header-eyebrow {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 6px;
}
.header-name {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 4px;
}
.header-sub {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 1.25rem;
}
.progress-wrap { display: flex; align-items: center; gap: 10px; }
.progress-track {
  flex: 1; height: 3px;
  background: var(--surface3);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  width: 0%;
}
.progress-label {
  font-size: 11px;
  color: var(--text2);
  min-width: 32px;
  text-align: right;
}

/* DAY NAV */
.day-nav {
  display: flex;
  gap: 6px;
  padding: 0 1.25rem 1.25rem;
  overflow-x: auto;
  scrollbar-width: none;
}
.day-nav::-webkit-scrollbar { display: none; }

.day-pill {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
  min-width: 56px;
}
.day-pill:hover { border-color: var(--border2); background: var(--surface2); }
.day-pill.active {
  background: var(--accent-dim2);
  border-color: var(--accent);
}
.day-pill.rest { opacity: 0.4; cursor: default; pointer-events: none; }
.day-abbr {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  font-weight: 500;
}
.day-pill.active .day-abbr { color: var(--accent); }
.day-num {
  font-size: 14px;
  font-weight: 500;
  color: var(--text2);
}
.day-pill.active .day-num { color: var(--accent2); }
.day-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--surface3);
  transition: background 0.2s;
}
.day-pill.done .day-dot { background: var(--success); }

/* WORKOUT SECTION */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 1.25rem 1rem;
}
.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--text);
}
.section-badge {
  font-size: 10px;
  letter-spacing: 0.05em;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 500;
}
.badge-done { background: var(--success-dim); color: var(--success); }
.badge-todo { background: var(--surface2); color: var(--text2); }

/* EXERCISE CARDS */
.exercises { padding: 0 1.25rem; }

.ex-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.25s ease;
}
.ex-card.completed { border-color: rgba(109,171,122,0.35); }
.ex-card.combined-card { border-left: 3px solid var(--warn); }

.ex-top {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 14px;
  cursor: pointer;
  user-select: none;
}
.ex-top:active { background: var(--surface2); }

.check {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  transition: all 0.2s ease;
  color: transparent;
  font-size: 13px;
}
.ex-card.completed .check {
  background: var(--success);
  border-color: var(--success);
  color: #fff;
}

.ex-info { flex: 1; min-width: 0; }
.ex-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 3px;
}
.ex-card.completed .ex-name {
  color: var(--text3);
  text-decoration: line-through;
}
.ex-meta {
  font-size: 11px;
  color: var(--text3);
}

.chevron {
  font-size: 12px;
  color: var(--text3);
  transition: transform 0.25s ease;
  flex-shrink: 0;
}
.ex-card.open .chevron { transform: rotate(180deg); }

/* EXPANDED DETAILS */
.ex-details {
  display: none;
  padding: 0 14px 14px;
}
.ex-card.open .ex-details { display: block; }

.divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 14px;
}

.combined-banner {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--warn);
  background: var(--warn-dim);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  margin-bottom: 12px;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 14px;
}
.stat-box {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
}
.stat-label {
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  display: block;
  margin-bottom: 4px;
}
.stat-val {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  display: block;
}

.instruction-text {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 12px;
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  border-left: 2px solid var(--accent);
}

.img-search-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  margin-bottom: 12px;
  text-align: left;
  transition: all 0.15s;
}
.img-search-btn:hover, .img-search-btn:active {
  border-color: var(--accent);
  color: var(--accent);
}
.img-search-btn .btn-icon { font-size: 14px; }

.variations-label {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
.variations-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.var-chip {
  font-size: 11px;
  padding: 5px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.var-chip:hover, .var-chip:active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* REST DAY */
.rest-view {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
  text-align: center;
  gap: 12px;
}
.rest-icon {
  font-size: 48px;
  margin-bottom: 4px;
  line-height: 1;
}
.rest-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--text);
}
.rest-sub { font-size: 13px; color: var(--text2); }

/* RESET */
.reset-btn {
  display: block;
  width: calc(100% - 2.5rem);
  margin: 1.25rem auto 0;
  padding: 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text3);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.03em;
}
.reset-btn:hover { border-color: var(--border2); color: var(--text2); }

/* SCROLL ANCHOR */
.scroll-anchor { height: 1px; }
</style>
</head>

let activeDay = "seg";
let done = {};
try { done = JSON.parse(localStorage.getItem("jcm_done") || "{}"); } catch(e) { done = {}; }

function save() {
  try { localStorage.setItem("jcm_done", JSON.stringify(done)); } catch(e) {}
}

function isDone(d, id) { return !!(done[d] && done[d][id]); }
function dayComplete(d) {
  const day = DAYS.find(x => x.id === d);
  if (!day || !day.workout) return false;
  const wk = WK[day.workout];
  return wk.exercises.every(ex => isDone(d, ex.id));
}
function globalPct() {
  let tot = 0, dn = 0;
  DAYS.forEach(d => {
    if (!d.workout) return;
    WK[d.workout].exercises.forEach(ex => { tot++; if (isDone(d.id, ex.id)) dn++; });
  });
  return tot ? Math.round(dn / tot * 100) : 0;
}

function toggleDone(dayId, exId) {
  if (!done[dayId]) done[dayId] = {};
  done[dayId][exId] = !done[dayId][exId];
  save();
  renderNav();
  renderWorkout();
}

function toggleCard(id) {
  const card = document.getElementById("c_" + id);
  if (card) card.classList.toggle("open");
}

function openSearch(q) {
  window.open("https://www.google.com/search?tbm=isch&q=" + encodeURIComponent(q), "_blank");
}

function renderNav() {
  const nav = document.getElementById("dayNav");
  nav.innerHTML = DAYS.map(d => {
    let cls = "day-pill";
    if (d.id === activeDay) cls += " active";
    if (!d.workout) cls += " rest";
    if (dayComplete(d.id)) cls += " done";
    const click = d.workout ? `onclick="selectDay('${d.id}')"` : "";
    return `<div class="${cls}" ${click}>
      <span class="day-abbr">${d.abbr}</span>
      <span class="day-num">${d.label}</span>
      <div class="day-dot"></div>
    </div>`;
  }).join("");

  const pct = globalPct();
  document.getElementById("gProgress").style.width = pct + "%";
  document.getElementById("gLabel").textContent = pct + "%";
}

function selectDay(id) {
  activeDay = id;
  renderNav();
  renderWorkout();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderWorkout() {
  const area = document.getElementById("mainArea");
  const day = DAYS.find(d => d.id === activeDay);

  if (!day || !day.workout) {
    area.innerHTML = `<div class="rest-view">
      <div class="rest-icon">🛌</div>
      <div class="rest-title">Dia de descanso</div>
      <div class="rest-sub">Recuperação faz parte do treino, Jen.<br>Aproveite para descansar e recarregar.</div>
    </div>`;
    return;
  }

  const wk = WK[day.workout];
  const dnCnt = wk.exercises.filter(ex => isDone(activeDay, ex.id)).length;
  const allDone = dnCnt === wk.exercises.length;

  let html = `<div class="section-header">
    <div class="section-title">${wk.title}</div>
    <span class="section-badge ${allDone ? "badge-done" : "badge-todo"}">${allDone ? "✓ Concluído" : dnCnt + "/" + wk.exercises.length}</span>
  </div><div class="exercises">`;

  wk.exercises.forEach(ex => {
    const dn = isDone(activeDay, ex.id);
    let cls = "ex-card";
    if (dn) cls += " completed";
    if (ex.combined) cls += " combined-card";

    const vars = ex.vars.map(v =>
      `<button class="var-chip" onclick="openSearch('${v.replace(/'/g,"\\'")} exercício academia')">${v}</button>`
    ).join("");

    html += `<div class="${cls}" id="c_${ex.id}">
      <div class="ex-top" onclick="toggleCard('${ex.id}')">
        <div class="check" onclick="event.stopPropagation(); toggleDone('${activeDay}','${ex.id}')">✓</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">${ex.series} séries · ${ex.reps} reps · ${ex.rest}</div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="ex-details">
        <div class="divider"></div>
        ${ex.combined ? `<div class="combined-banner"><span>⇄</span> Exercício combinado — alterne com o par</div>` : ""}
        <div class="stats-row">
          <div class="stat-box"><span class="stat-label">Séries</span><span class="stat-val">${ex.series}</span></div>
          <div class="stat-box"><span class="stat-label">Reps</span><span class="stat-val">${ex.reps}</span></div>
          <div class="stat-box"><span class="stat-label">Intervalo</span><span class="stat-val">${ex.rest}</span></div>
        </div>
        ${ex.note ? `<div class="instruction-text">${ex.note}</div>` : ""}
        <button class="img-search-btn" onclick="openSearch('${ex.q.replace(/'/g,"\\'")}')">
          <span class="btn-icon">🔍</span> Ver imagens do exercício no Google
        </button>
        <div class="variations-label">Variações</div>
        <div class="variations-wrap">${vars}</div>
      </div>
    </div>`;
  });

  html += `</div>
  <button class="reset-btn" onclick="resetDay('${activeDay}')">Resetar dia</button>
  <div class="scroll-anchor"></div>`;

  area.innerHTML = html;
}

function resetDay(id) {
  done[id] = {};
  save();
  renderNav();
  renderWorkout();
}

// Init
renderNav();
renderWorkout();
</script>
</body>
</html>
